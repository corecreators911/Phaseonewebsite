[build]
  command = "pnpm build"
  publish = "dist"

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed Vite output — filenames change on every rebuild, safe to cache permanently
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Public static directories — no content hash, 1-week TTL
[[headers]]
  for = "/logo/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/hero-reel/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/about-us/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/projects/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML — always revalidate so deploys are picked up immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers — applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
